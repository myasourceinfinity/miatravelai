
<style>
#erd-root { padding: 12px 0; font-family: var(--font-sans); }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tab { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; cursor: pointer; transition: all .15s; }
.tab.active { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
#erd-svg-container svg { width: 100%; }
</style>
<div id="erd-root">
  <div class="tabs">
    <button class="tab active" onclick="showDomain('identity')">Identity & Access</button>
    <button class="tab" onclick="showDomain('travel')">Core Travel & AI</button>
    <button class="tab" onclick="showDomain('marketplace')">Marketplace & Orders</button>
    <button class="tab" onclick="showDomain('financial')">Financial & Wallet</button>
    <button class="tab" onclick="showDomain('all')">All Domains</button>
  </div>
  <div id="erd-svg-container"></div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2850' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
  },
});

const diagrams = {
  identity: `erDiagram
    Roles {
      int id PK
      varchar name
      text description
    }
    Users {
      int id PK
      uuid uuid
      varchar firstname
      varchar lastname
      varchar email
      varchar password_hash
      int role_id FK
      timestamp created_dt
    }
    Logins {
      int id PK
      int user_id FK
      varchar session_tokens
      inet ip_address
      timestamp last_login_dt
    }
    CompanyDetails {
      int id PK
      varchar company_name
      varchar business_registration_number
      varchar contact_email
      timestamp created_dt
    }
    Agent_Profiles {
      int id PK
      int user_id FK
      int company_id FK
      varchar specialty
      boolean is_verified
      timestamp created_dt
    }
    Traveler_Profiles {
      int id PK
      int user_id FK
      varchar default_currency
      vector preferences_vector
      timestamp created_dt
    }
    Roles ||--o{ Users : "assigned to"
    Users ||--o{ Logins : "has"
    Users ||--o| Agent_Profiles : "has"
    Users ||--o| Traveler_Profiles : "has"
    CompanyDetails ||--o{ Agent_Profiles : "belongs to"
  `,
  travel: `erDiagram
    Traveler_Profiles {
      int id PK
      int user_id FK
    }
    Users {
      int id PK
    }
    Agent_Profiles {
      int id PK
      int user_id FK
    }
    Destination {
      int id PK
      varchar name
      varchar country
      text description
      vector destination_embedding
      timestamp created_dt
    }
    TripPlans {
      int id PK
      int traveler_id FK
      varchar title
      varchar status
      decimal estimated_total_cost
      timestamp created_dt
    }
    Itineraries {
      int id PK
      int trip_plan_id FK
      int day_number
      int destination_id FK
      jsonb ai_generated_details
      timestamp created_dt
    }
    Deals_Packages {
      int id PK
      int agent_id FK
      varchar title
      decimal base_price
      vector package_embedding
      timestamp created_dt
    }
    AI_Prompt_Logs {
      int id PK
      int user_id FK
      text prompt_text
      jsonb ai_response
      int tokens_used
      timestamp created_dt
    }
    SearchHistory {
      int id PK
      int user_id FK
      text search_query
      jsonb filters_applied
      timestamp created_dt
    }
    Traveler_Profiles ||--o{ TripPlans : "creates"
    TripPlans ||--o{ Itineraries : "contains"
    Destination ||--o{ Itineraries : "referenced in"
    Agent_Profiles ||--o{ Deals_Packages : "offers"
    Users ||--o{ AI_Prompt_Logs : "generates"
    Users ||--o{ SearchHistory : "has"
  `,
  marketplace: `erDiagram
    Traveler_Profiles {
      int id PK
    }
    Agent_Profiles {
      int id PK
    }
    TripPlans {
      int id PK
    }
    Users {
      int id PK
    }
    Quote_Requests {
      int id PK
      int traveler_id FK
      int agent_id FK
      int trip_plan_id FK
      varchar status
      decimal quoted_price
      text agent_notes
      timestamp created_dt
    }
    Bookings {
      int id PK
      int trip_plan_id FK
      varchar vendor_name
      varchar booking_reference
      varchar status
      decimal cost
      timestamp created_dt
    }
    Ratings {
      int id PK
      int user_id FK
      varchar target_type
      int target_id
      int score
      text review_text
      timestamp created_dt
    }
    Blog_Contents {
      int id PK
      int author_id FK
      varchar title
      text body
      vector content_embedding
      timestamp created_dt
    }
    Traveler_Profiles ||--o{ Quote_Requests : "submits"
    Agent_Profiles ||--o{ Quote_Requests : "receives"
    TripPlans ||--o{ Quote_Requests : "linked to"
    TripPlans ||--o{ Bookings : "generates"
    Users ||--o{ Ratings : "gives"
    Users ||--o{ Blog_Contents : "authors"
  `,
  financial: `erDiagram
    Users {
      int id PK
    }
    Agent_Profiles {
      int id PK
    }
    Wallets {
      int id PK
      int user_id FK
      decimal balance
      varchar currency
      varchar status
      timestamp updated_dt
    }
    Transactions {
      int id PK
      int wallet_id FK
      decimal amount
      varchar transaction_type
      varchar status
      varchar idempotency_key
      timestamp created_dt
    }
    Installments {
      int id PK
      int transaction_id FK
      decimal amount_due
      date due_date
      varchar status
      timestamp paid_dt
    }
    PromoCodes_Discounts {
      int id PK
      varchar code
      decimal discount_percentage
      decimal max_discount_amount
      timestamp valid_until
      boolean is_active
    }
    Platform_Commissions {
      int id PK
      int transaction_id FK
      int agent_id FK
      decimal total_amount
      decimal platform_fee
      decimal agent_payout
      varchar status
      timestamp created_dt
    }
    Users ||--|| Wallets : "owns"
    Wallets ||--o{ Transactions : "records"
    Transactions ||--o{ Installments : "split into"
    Transactions ||--o{ Platform_Commissions : "generates"
    Agent_Profiles ||--o{ Platform_Commissions : "receives"
  `,
  all: `erDiagram
    Roles ||--o{ Users : "assigned to"
    Users ||--o{ Logins : "has"
    Users ||--o| Agent_Profiles : "has"
    Users ||--o| Traveler_Profiles : "has"
    CompanyDetails ||--o{ Agent_Profiles : "belongs to"
    Traveler_Profiles ||--o{ TripPlans : "creates"
    TripPlans ||--o{ Itineraries : "contains"
    Destination ||--o{ Itineraries : "referenced in"
    Agent_Profiles ||--o{ Deals_Packages : "offers"
    Users ||--o{ AI_Prompt_Logs : "generates"
    Users ||--o{ SearchHistory : "has"
    Traveler_Profiles ||--o{ Quote_Requests : "submits"
    Agent_Profiles ||--o{ Quote_Requests : "receives"
    TripPlans ||--o{ Quote_Requests : "linked to"
    TripPlans ||--o{ Bookings : "generates"
    Users ||--o{ Ratings : "gives"
    Users ||--o{ Blog_Contents : "authors"
    Users ||--|| Wallets : "owns"
    Wallets ||--o{ Transactions : "records"
    Transactions ||--o{ Installments : "split into"
    Transactions ||--o{ Platform_Commissions : "generates"
    Agent_Profiles ||--o{ Platform_Commissions : "receives"
  `
};

let current = 'identity';

window.showDomain = async function(domain) {
  current = domain;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  await render(domain);
};

async function render(domain) {
  const container = document.getElementById('erd-svg-container');
  container.innerHTML = '<div style="color:var(--color-text-secondary);font-size:13px;padding:20px 0">Rendering…</div>';
  try {
    const id = 'erd-' + domain + '-' + Date.now();
    const { svg } = await mermaid.render(id, diagrams[domain]);
    container.innerHTML = svg;

    container.querySelectorAll('svg .node').forEach(node => {
      const firstPath = node.querySelector('path[d]');
      if (!firstPath) return;
      const d = firstPath.getAttribute('d');
      const nums = d.match(/-?[\d.]+/g)?.map(Number);
      if (!nums || nums.length < 8) return;
      const xs = [nums[0], nums[2], nums[4], nums[6]];
      const ys = [nums[1], nums[3], nums[5], nums[7]];
      const x = Math.min(...xs), y = Math.min(...ys);
      const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('rx', '8');
      for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
        if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
      }
      firstPath.replaceWith(rect);
    });

    container.querySelectorAll('svg .row-rect-odd path, svg .row-rect-even path').forEach(p => {
      p.setAttribute('stroke', 'none');
    });
  } catch(e) {
    container.innerHTML = '<div style="color:var(--color-text-danger);font-size:13px;padding:20px 0">Render error: ' + e.message + '</div>';
  }
}

render('identity');
</script>
